<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Sistema Clínico | Recuperar Contraseña</title>
    <link rel="stylesheet" th:href="@{/plugins/fontawesome-free/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/dist/css/adminlte.min.css}">
</head>
<body class="hold-transition login-page">
<div class="login-box">
    <div class="card card-outline card-primary">
        <div class="card-header text-center">
            <a href="#" class="h1"><b>Gestión</b>Clínica</a>
        </div>
        <div class="card-body">
            <p class="login-box-msg">¿Olvidaste tu contraseña? Aquí puedes recuperarla fácilmente.</p>

            <div th:if="${error}" class="alert alert-danger text-center" th:text="${error}"></div>
            <div th:if="${mensaje}" class="alert alert-success text-center" th:text="${mensaje}"></div>

            <form th:action="@{/forgot-password}" method="post">
                <div class="input-group mb-3">
                    <input type="email" class="form-control" name="email" placeholder="Ingresa tu Email" required>
                    <div class="input-group-append"><div class="input-group-text"><span class="fas fa-envelope"></span></div></div>
                </div>
                <div class="row">
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary btn-block">Solicitar nueva contraseña</button>
                    </div>
                </div>
            </form>
            <p class="mt-3 mb-1">
                <a th:href="@{/login}">Volver al inicio de sesión</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
