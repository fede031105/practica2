<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Sistema Clínico | Registro</title>
    <link rel="stylesheet" th:href="@{/plugins/fontawesome-free/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/dist/css/adminlte.min.css}">
</head>
<body class="hold-transition register-page">
<div class="register-box">
    <div class="card card-outline card-primary">
        <div class="card-header text-center">
            <a href="#" class="h1"><b>Gestión</b>Clínica</a>
        </div>
        <div class="card-body">
            <p class="login-box-msg">Registra una nueva cuenta</p>

            <form th:action="@{/register}" th:object="${usuario}" method="post">
                <div class="input-group mb-3">
                    <input type="text" class="form-control" placeholder="Nombre completo" th:field="*{nombre_completo}" required>
                    <div class="input-group-append"><div class="input-group-text"><span class="fas fa-user"></span></div></div>
                </div>
                <div class="input-group mb-3">
                    <input type="email" class="form-control" placeholder="Email" th:field="*{email}" required>
                    <div class="input-group-append"><div class="input-group-text"><span class="fas fa-envelope"></span></div></div>
                </div>
                <div class="input-group mb-3">
                    <input type="password" class="form-control" placeholder="Contraseña" th:field="*{password}" required>
                    <div class="input-group-append"><div class="input-group-text"><span class="fas fa-lock"></span></div></div>
                </div>
                <div class="row">
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary btn-block">Registrarse</button>
                    </div>
                </div>
            </form>
            <a th:href="@{/login}" class="text-center mt-3 d-block">Ya tengo una cuenta</a>
        </div>
    </div>
</div>
</body>
</html>
