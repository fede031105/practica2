<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Sistema Clínico | Pacientes</title>
    <link rel="stylesheet" th:href="@{/plugins/fontawesome-free/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/dist/css/adminlte.min.css}">
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">

    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
        <span class="nav-link text-primary font-weight-bold">
          <i class="fas fa-user-circle"></i> <span th:text="${session.usuarioLogueado}"></span>
        </span>
            </li>
        </ul>
    </nav>

    <aside class="main-sidebar sidebar-dark-primary elevation-4">
        <a th:href="@{/dashboard}" class="brand-link">
            <span class="brand-text font-weight-light ml-3">Gestión Clínica</span>
        </a>
        <div class="sidebar">
            <nav class="mt-2">
                <ul class="nav nav-pills nav-sidebar flex-column">
                    <li class="nav-item"><a th:href="@{/dashboard}" class="nav-link"><p>Panel de Control</p></a></li>
                    <li class="nav-item"><a th:href="@{/pacientes}" class="nav-link active"><p>Pacientes</p></a></li>
                    <li class="nav-item"><a th:href="@{/consultas}" class="nav-link"><p>Citas Médicas</p></a></li>
                    <li class="nav-item"><a th:href="@{/estadisticas}" class="nav-link"><p>Estadísticas</p></a></li>
                </ul>
            </nav>
        </div>
    </aside>

    <div class="content-wrapper">
        <section class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6">
                        <h1>Listado de Pacientes</h1>
                    </div>
                    <div class="col-sm-6 text-right">
                        <a th:href="@{/pacientes/crear}" class="btn btn-primary">
                            <i class="fas fa-plus"></i> Nuevo Paciente
                        </a>
                    </div>
                </div>
            </div>
        </section>

        <section class="content">
            <div class="container-fluid">

                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="icon fas fa-ban"></i>
                    <span th:text="${error}"></span>
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>

                <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="icon fas fa-check"></i>
                    <span th:text="${mensaje}"></span>
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>

                <div class="card">
                    <div class="card-body p-0">
                        <table class="table table-striped">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Fecha de Nac.</th>
                                <th>Género</th>
                                <th>Teléfono</th>
                                <th>Acciones</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="paciente : ${pacientes}">
                                <td th:text="${paciente.id_paciente}"></td>
                                <td th:text="${paciente.nombre}"></td>
                                <td th:text="${paciente.fecha_nacimiento}"></td>
                                <td th:text="${paciente.genero}"></td>
                                <td th:text="${paciente.telefono}"></td>
                                <td>
                                    <a th:href="@{/pacientes/editar/{id}(id=${paciente.id_paciente})}" class="btn btn-sm btn-warning">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <a th:href="@{/pacientes/eliminar/{id}(id=${paciente.id_paciente})}" class="btn btn-sm btn-danger" onclick="return confirm('¿Estás seguro de eliminar este paciente?');">
                                        <i class="fas fa-trash"></i>
                                    </a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>

<script th:src="@{/plugins/jquery/jquery.min.js}"></script>
<script th:src="@{/plugins/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/dist/js/adminlte.min.js}"></script>
</body>
</html>
